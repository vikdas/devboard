# Goal: Build the image for Devboard Frontend and push to the Docker hub
name: CI
on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: actions/checkout@v7

      - name: docker setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{vars.DOCKER_UNAME}} 
          password: ${{secrets.DOCKER_TOKEN}}
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: user/app:latest
          
      




