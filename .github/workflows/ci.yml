# Goal: Build the image for Devboard Frontend and push to the Docker hub
name: CI
on:
  push:
    branches: [master]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: actions/checkout@v7

      - name: docket setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{vars.DOCKER_UNAME}}
          password: ${{secrets.DOCKER_TOKEN}}
      




