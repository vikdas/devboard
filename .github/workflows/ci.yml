# Goal: Build the image for Devboard Frontend and push to the Docker hub
name: CI
on:
  push:
    branches: [master]

jobs:
lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # 👈 Set this to your project's Node version
          cache: 'npm'       # 👈 Automatically caches dependencies for speed

      - name: Install dependencies
        run: npm ci          # 👈 Standard clean install for CI environments

      - name: Run Linter
        run: npm run lint    # 👈 Executes your project's linting script
        
  build-and-push:
    needs: [lint]
    runs-on: ubuntu-latest

    steps:
      - name: code checkout
        uses: actions/checkout@v7

      - name: docker setup [Login]
        uses: docker/login-action@v4
        with:
          username: ${{vars.DOCKER_UNAME}} 
          password: ${{secrets.DOCKER_TOKEN}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{vars.DOCKER_UNAME}}/app:latest

          
      




